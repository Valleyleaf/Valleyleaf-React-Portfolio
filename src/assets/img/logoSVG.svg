<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 38" width="100" height="38">
  <defs>
    <style>
      :root {
        --arcRed: #fc0101;
        --arcYellow: #fcbd01;
        --arcGreen: #02fd6b;
        --arcBlue: #049afd;
        --arcBG: #1a1a1a00;
      }

      .topper-svg-lines {
        opacity: 1.0;
        /* Applies the 70deg rotation from the center of the lines element */
        transform-origin: center;
        transform: rotate(70deg);
      }
    </style>

    <linearGradient id="topperGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="var(--arcRed)" />
      <stop offset="20%" stop-color="var(--arcRed)" />
      
      <stop offset="20%" stop-color="var(--arcBG)" />
      <stop offset="25%" stop-color="var(--arcBG)" />
      
      <stop offset="25%" stop-color="var(--arcYellow)" />
      <stop offset="45%" stop-color="var(--arcYellow)" />
      
      <stop offset="45%" stop-color="var(--arcBG)" />
      <stop offset="50%" stop-color="var(--arcBG)" />
      
      <stop offset="50%" stop-color="var(--arcGreen)" />
      <stop offset="70%" stop-color="var(--arcGreen)" />
      
      <stop offset="70%" stop-color="var(--arcBG)" />
      <stop offset="75%" stop-color="var(--arcBG)" />
      
      <stop offset="75%" stop-color="var(--arcBlue)" />
      <stop offset="95%" stop-color="var(--arcBlue)" />

      <stop offset="95%" stop-color="var(--arcBG)" />
      <stop offset="100%" stop-color="var(--arcBG)" />
    </linearGradient>
  </defs>

  <g clip-path="url(#container-clip)">
    <clipPath id="container-clip">
      <rect width="100" height="38" />
    </clipPath>

    <rect 
      x="-30" 
      y="-4.1" 
      width="160" 
      height="60" 
      fill="url(#topperGradient)" 
      class="topper-svg-lines" 
    />
  </g>
</svg>
